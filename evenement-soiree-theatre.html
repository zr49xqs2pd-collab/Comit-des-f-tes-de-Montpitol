<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soirée théâtre - Comité des Fêtes de Montpitol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="photos.js"></script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <main class="mx-auto max-w-5xl px-4 py-10 sm:px-6">
      <a href="evenements.html" class="text-sm font-semibold text-blue-700 hover:underline">← Retour aux événements</a>
      <h1 class="mt-4 text-3xl font-extrabold text-slate-900">Soirée théâtre</h1>
      <p class="mt-2 text-slate-600">Une soirée festive et conviviale autour de la pièce "Perdu dans une boîte à chaussures".</p>
      <div class="mt-6 overflow-hidden rounded-2xl border border-fuchsia-200 bg-white shadow-sm">
        <div id="img-theatre" class="h-96 w-full bg-cover bg-center bg-no-repeat"></div>
      </div>
    </main>
    <script>
      document.getElementById('img-theatre').style.backgroundImage = `url('${PHOTOS.theatre}')`;
    </script>
  </body>
</html>
